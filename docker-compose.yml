version: "3.9"

services:
  ai-muliawan-god:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ai-muliawan-god-v6
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ai_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: ai-muliawan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/letsencrypt:ro
    depends_on:
      ai-muliawan-god:
        condition: service_healthy
    networks:
      - ai_network
    profiles:
      - with-nginx

volumes:
  app_logs:
    driver: local
  nginx_certs:
    driver: local

networks:
  ai_network:
    driver: bridge
